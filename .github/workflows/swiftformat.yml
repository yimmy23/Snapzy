name: SwiftFormat Validation

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: swiftformat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftformat:
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

